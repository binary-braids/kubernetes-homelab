name: Host 01 Terraform CD

on:
  workflow_dispatch:
  pull_request: 
    paths:
      - 'terraform/host_01/**'
    
permissions:
  contents: write
  issues: write

env:
  WORKING_DIRECTORY: './terraform/host_01/'

jobs:
  init_and_plan:
    name: Terraform Init and Plan
    runs-on: Self-Hosted

    outputs:
      planExitcode: ${{ steps.terraformPlan.outputs.exitcode }}

    steps:

      - name: Checkout 🔔
        uses: actions/checkout@v6.0.2

      - name: Map Secrets to Environment Variables 🗺️ 
        uses: oNaiPs/secrets-to-env-action@v1.8
        with:
            secrets: ${{ toJSON(secrets) }}        

      - name: Replace Tokens 🪙
        uses: cschleiden/replace-tokens@v1.3
        with:
          files: '["${{ env.WORKING_DIRECTORY }}**/*"]'

      - name: Install Terraform ⛰️
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Init 🏃
        id: terraformInit
        run: terraform init
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Terraform Plan 🗺️
        id: terraformPlan
        run: |
          terraform plan -input=false -no-color -out ${{ github.sha }}.tfplan -detailed-exitcode 
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Cache Terraform Plan 📦
        uses: actions/cache/save@v5.0.4
        with:
          path: '${{ env.WORKING_DIRECTORY }}**'
          key: ${{ github.sha }}

  apply:
    name: Terraform Apply
    needs:
      - init_and_plan
    if: needs.init_and_plan.outputs.planExitcode == 2
    runs-on: Self-Hosted

    steps:

      - name: Manual Approval 🚦
        uses: trstringer/manual-approval@v1.12.0
        with:
          secret: ${{ github.TOKEN }}
          approvers: data-tangles
          minimum-approvals: 1
          issue-title: "Terraform Apply"
          issue-body: "Please approve or deny the Terraform Apply operation"
          exclude-workflow-initiator-as-approver: false

      - name: Checkout 🔔
        uses: actions/checkout@v6.0.2

      - name: Restore Terraform Plan 🗺️
        uses: actions/cache/restore@v5.0.4
        with:
          path: '${{ env.WORKING_DIRECTORY }}**'
          key: ${{ github.sha }}

      - name: Install Terraform ⛰️
        uses: hashicorp/setup-terraform@v4.0.0

      - name: Terraform Apply 🚀
        run: terraform apply ${{ github.sha }}.tfplan
        working-directory: ${{ env.WORKING_DIRECTORY }}

