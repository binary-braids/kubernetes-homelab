name: CI

on:
  push:
    branches:
      - "main"

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    outputs:
      skipped: ${{ steps.changelog.outputs.skipped }}
      tag: ${{ steps.changelog.outputs.tag }}
      clean_changelog: ${{ steps.changelog.outputs.clean_changelog }}
      version: ${{ steps.changelog.outputs.version }}      

    steps:

      - name: Generate GitHub App Token 🪙
        uses: actions/create-github-app-token@v3.0.0
        id: generate-token
        with:
          app-id: ${{ secrets.BRAID_BOT_APP_ID }}
          private-key: ${{ secrets.BRAID_BOT_PRIVATE_KEY }}

      - name: Checkout 🔔
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.generate-token.outputs.token }}

      - name: Conventional Changelog Action 📋
        id: changelog
        uses: TriPSs/conventional-changelog-action@v6.3.0
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          git-user-name: "braid-bot[bot]"
          git-user-email: "169546839+braid-bot[bot]@users.noreply.github.com"
          release-count: 10
          version-file: package.yaml
          create-summary: true

      - name: Generate Release 📦
        if: ${{ steps.changelog.outputs.skipped == 'false' }}
        uses: softprops/action-gh-release@v2.6.1
        with:
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: ${{ steps.changelog.outputs.tag }}
          generate_release_notes: true
          body: ${{ steps.changelog.outputs.clean_changelog }}