apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: longhorn-httproute
  namespace: longhorn-system
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
  hostnames:
  - longhorn.binarybraids.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - kind: Service
        name: longhorn-frontend
        namespace: longhorn-system
        port: 80