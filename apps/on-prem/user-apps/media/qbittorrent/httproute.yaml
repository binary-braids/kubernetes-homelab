apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: qbittorrent-httproute
  namespace: media
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
  hostnames:
  - qbittorrent.binarybraids.com
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /
      backendRefs:
      - kind: Service
        name: qbittorrent-service
        namespace: media
        port: 8080